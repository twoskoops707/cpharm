name: Build Wizard EXE

on:
  push:
    branches:
      - arm64-emulator-fix
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow

      - name: Build EXE
        env:
          CPHARM_WIZARD_DIR: wizard
        run: |
          pyinstaller --onefile --windowed --name CPharmSetup wizard/setup_wizard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPharmSetup-exe
          path: dist/CPharmSetup.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          $tag = if ($env:GITHUB_REF -match 'refs/tags/(.+)') { $matches[1] } else { "arm64-emulator-fix" }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          if (Test-Path dist/CPharmSetup.exe) {
            Write-Output "EXE found at dist/CPharmSetup.exe"
          }
        shell: pwsh