name: Build CPharm Setup Wizard (.exe)

on:
  push:
    paths:
      - 'wizard/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build .exe
        working-directory: wizard
        run: |
          pyinstaller --onefile --windowed --name CPharmSetup setup_wizard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPharmSetup-exe
          path: wizard/dist/CPharmSetup.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          BUILD_NUM: ${{ github.run_number }}
        with:
          tag_name: wizard-${{ github.run_number }}
          name: "CPharm Setup Wizard (build ${{ github.run_number }})"
          body: |
            ## CPharm Setup Wizard

            ### How to use
            1. Download **CPharmSetup.exe** below
            2. Double-click it on any Windows 10/11 PC
            3. Follow the on-screen steps

            ### What it does
            - Checks and installs all required software (Python, Git, ADB)
            - Downloads the CPharm files to your PC
            - Connects your Android phones via ADB
            - Lets you build a tap sequence on your master phone
            - Runs that sequence across all your phones automatically
          files: wizard/dist/CPharmSetup.exe
          draft: false
          prerelease: false
