name: Verify automation (smoke + compile)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke + compileall
        run: |
          python automation/smoke_imports.py
          python -m compileall -q automation wizard gui
