name: Build CPharm Setup Wizard (.exe)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build .exe
        working-directory: wizard
        run: |
          pyinstaller --onefile --windowed --name CPharmSetup --hidden-import wizard_theme setup_wizard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPharmSetup-exe-${{ github.sha }}
          path: wizard/dist/CPharmSetup.exe
          retention-days: 30
