name: Build CPharm Setup Wizard (.exe)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build .exe
        working-directory: wizard
        run: |
          pyinstaller --onefile --windowed --name CPharmSetup --hidden-import wizard_theme --add-data "assets;assets" setup_wizard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPharmSetup-exe-${{ github.sha }}
          path: wizard/dist/CPharmSetup.exe
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wizard-build-${{ github.run_number }}
          name: CPharm Setup Wizard (build ${{ github.run_number }})
          body: |
            Windows installer build from CI.

            - **Build number:** ${{ github.run_number }}
            - **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Workflow run:** [actions/${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          draft: false
          prerelease: false
          files: wizard/dist/CPharmSetup.exe
          fail_on_unmatched_files: true
